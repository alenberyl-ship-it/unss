<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administrateur</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            max-width: 450px;
            margin: 5em auto;
            padding: 40px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .login-container h2 {
            text-align: center;
            color: #0e4863;
            margin-bottom: 2em;
            font-size: 1.8em;
        }

        .login-container form div {
            margin-bottom: 1.5em;
        }

        .login-container form label {
            display: block;
            margin-bottom: 0.7em;
            font-weight: 600;
            color: #0e4863;
        }

        .login-container form input {
            width: 100%;
            padding: 0.9em;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .login-container form input:focus {
            outline: none;
            border-color: #136f65;
            box-shadow: 0 0 8px rgba(19, 111, 101, 0.2);
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border-left: 5px solid #dc3545;
            padding: 1em;
            margin-bottom: 1.5em;
            border-radius: 8px;
        }

        .login-container button {
            width: 100%;
            padding: 1em;
            margin-top: 1em;
            font-size: 1.1em;
        }

        .login-info {
            background: #e8f1f5;
            padding: 1em;
            border-radius: 8px;
            margin-top: 2em;
            font-size: 0.9em;
            color: #0e4863;
            border-left: 4px solid #136f65;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Connexion Administrateur</h2>
        {% if message %}
            <div class="error">{{ message }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('admin_login') }}">
            <div>
                <label for="identifiant">📧 Identifiant (Email)</label>
                <input type="text" id="identifiant" name="identifiant" placeholder="admin@sauveteurs.com" required>
            </div>
            <div>
                <label for="password">🔑 Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required>
            </div>
            <button type="submit" class="btn">Se connecter</button>
        </form>
        <div class="login-info">
            <strong>Connexion de démonstration :</strong><br>
            Email: <code>admin@sauveteurs.com</code><br>
            Mot de passe: <code>admin123</code>
        </div>
    </div>
</body>
</html>
